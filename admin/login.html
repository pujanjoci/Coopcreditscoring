<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Coop Credit Portal</title>
  <meta name="description" content="Secure admin login for the Dairy Cooperative Credit Scoring Portal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #2563eb;
      --primary-hover:  #1d4ed8;
      --surface-1:      #ffffff;
      --surface-2:      #f5f5f5;
      --border-light:   #e2e5ea;
      --ink-1:          #0f172a;
      --ink-2:          #1e293b;
      --ink-3:          #334155;
      --ink-4:          #64748b;
      --ink-5:          #94a3b8;
      --shadow-sm:      0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:      0 4px 16px rgba(0,0,0,0.08);
      --danger:         #dc2626;
      --danger-bg:      #fef2f2;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #eef1f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ─── Card ─── */
    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--surface-1);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-light);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Header ─── */
    .login-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    .login-logo svg, .login-logo i { color: #fff; width: 26px; height: 26px; stroke-width: 1.8; }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: var(--ink-1);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 13.5px;
      text-align: center;
      color: var(--ink-4);
      line-height: 1.55;
      margin-bottom: 28px;
    }

    /* ─── Divider ─── */
    .login-divider {
      border: none;
      border-top: 1px solid var(--border-light);
      margin-bottom: 24px;
    }

    /* ─── Form ─── */
    .input-grp {
      margin-bottom: 18px;
    }

    .input-grp label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-3);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border-radius: 9px;
      border: 1.5px solid var(--border-light);
      font-size: 14.5px;
      font-family: inherit;
      background: var(--surface-2);
      color: var(--ink-2);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3.5px rgba(37, 99, 235, 0.1);
    }

    /* Password toggle eye button */
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--ink-5);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--ink-2); }
    .pw-toggle svg, .pw-toggle i { width: 17px; height: 17px; stroke-width: 2; pointer-events: none; }

    /* ─── Submit ─── */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(37,99,235,0.25);
      margin-top: 6px;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login svg, .btn-login i { width: 15px; height: 15px; stroke-width: 2.2; }

    /* ─── Error ─── */
    .login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: var(--danger-bg);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    /* ─── Footer label ─── */
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 11.5px;
      color: var(--ink-5);
      line-height: 1.5;
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .login-card {
        padding: 30px 22px 26px;
        border-radius: 14px;
      }
      .login-title { font-size: 19px; }
      .login-subtitle { font-size: 13px; margin-bottom: 22px; }
      .input-wrap input { font-size: 16px; padding: 13px 44px 13px 13px; }
      .btn-login { padding: 14px; font-size: 15.5px; }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <i data-lucide="landmark"></i>
      </div>
      <h1 class="login-title">Admin Dashboard</h1>
      <p class="login-subtitle">Sign in to review and approve cooperative credit assessments.</p>
      <hr class="login-divider">

      <form id="loginForm" autocomplete="on" novalidate>

        <div class="input-grp">
          <label for="login_email">Email Address</label>
          <div class="input-wrap">
            <input type="email" id="login_email" name="email"
                   placeholder="admin@coop.com" autocomplete="username" required>
          </div>
        </div>

        <div class="input-grp">
          <label for="login_password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login_password" name="password"
                   placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" id="pw_toggle" aria-label="Toggle password visibility">
              <i data-lucide="eye" id="pw_eye_icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn_submit">
          <span id="btn_label">Sign In</span>
          <i data-lucide="arrow-right" id="btn_icon"></i>
        </button>

        <div id="login_error" class="login-error" role="alert"></div>
      </form>
    </div>

    <p class="login-footer">Dairy Cooperative Credit Scoring Portal &bull; Admin Access Only</p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    lucide.createIcons();

    // ── Password visibility toggle ──
    const pwToggle = document.getElementById('pw_toggle');
    const pwInput  = document.getElementById('login_password');
    let pwVisible  = false;

    pwToggle.addEventListener('click', function () {
      pwVisible = !pwVisible;
      pwInput.type = pwVisible ? 'text' : 'password';
      // Swap icon
      pwToggle.innerHTML = pwVisible
        ? '<i data-lucide="eye-off" id="pw_eye_icon"></i>'
        : '<i data-lucide="eye" id="pw_eye_icon"></i>';
      lucide.createIcons();
    });

    // ── Form submit ──
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('login_email').value.trim();
      const pass  = document.getElementById('login_password').value;
      if (!email || !pass) return;
      login(email, pass);
    });
  </script>
</body>
</html>
