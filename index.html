<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Cooperative Credit Scoring Portal — Nepal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="portal-header">
    <div class="header-container">
      <div class="portal-title">
        <div class="logo-icon"><i data-lucide="landmark"></i></div>
        Dairy Cooperative Credit Scoring
        <span class="title-badge">Nepal</span>
      </div>
      <div class="header-step-indicator" id="header_step">Configure to start</div>
    </div>
  </header>
  <div class="global-progress"><div class="global-progress-fill" id="global_progress_fill"></div></div>

  <!-- ===== MAIN CONTAINER ===== -->
  <main class="portal-main-container">
    <div class="page-content">


      <!-- ===== CONFIG PANEL ===== -->
      <div class="config-panel" id="config">
        <h2><i data-lucide="sliders-horizontal"></i> Application Configuration</h2>
        <div class="config-row">
          <div class="config-card-group">
            <label class="bilingual-label">
              Cooperative Model Type <span class="required-tag">Required</span>
              <span class="nepali-text">सहकारी मोडलको प्रकार</span>
            </label>
            <div class="toggle-fields">
              <label class="radio-card" onclick="setCoopType('collection')">
                <input type="radio" name="coop_type" value="collection" id="type_collection">
                <div><i data-lucide="truck"></i><strong>Collection Only</strong><small>दूध सङ्कलन मात्र</small></div>
              </label>
              <label class="radio-card" onclick="setCoopType('processing')">
                <input type="radio" name="coop_type" value="processing" id="type_processing">
                <div><i data-lucide="cog"></i><strong>Collection &amp; Processing</strong><small>सङ्कलन र प्रशोधन</small></div>
              </label>
            </div>
          </div>
          <div class="config-card-group">
            <label class="bilingual-label">
              Customer Status <span class="required-tag">Required</span>
              <span class="nepali-text">ग्राहक स्थिति</span>
            </label>
            <div class="toggle-fields">
              <label class="radio-card" onclick="setCustomerType('new')">
                <input type="radio" name="customer_type" value="new" id="cust_new">
                <div><i data-lucide="user-plus"></i><strong>New Customer</strong><small>नयाँ ग्राहक</small></div>
              </label>
              <label class="radio-card" onclick="setCustomerType('existing')">
                <input type="radio" name="customer_type" value="existing" id="cust_existing">
                <div><i data-lucide="user-check"></i><strong>Existing Customer</strong><small>पुरानो ग्राहक</small></div>
              </label>
            </div>
          </div>
        </div>
        <div id="config_alert" class="alert hidden" style="margin-top:16px">
          <i data-lucide="alert-triangle"></i>
          Please select both Cooperative Type and Customer Status to begin.
        </div>
        <button class="btn-next hidden" id="btn_start_questions" onclick="navigateTo('questions')"
          style="margin-top:20px;width:100%;justify-content:center;padding:12px 24px;">
          <i data-lucide="arrow-right" style="width:15px;height:15px;stroke-width:2.5"></i>
          Continue to Questions
        </button>
      </div>

      <!-- ===== QUESTIONS PANEL ===== -->
      <div id="questions" class="hidden">
        <div id="questions_container" style="max-width:800px;margin:0 auto;"></div>
        <div style="max-width:800px;margin:24px auto 0;display:flex;justify-content:flex-end;">
          <button class="btn-calculate" id="btn_calculate_main" onclick="handleCalculateClick()">
            <i data-lucide="calculator"></i>
            Calculate Credit Score
          </button>
        </div>
      </div>

      <!-- ===== (Result Panel moved to Admin) ===== -->

    </div><!-- /page-content -->
  </main>
</div>

<!-- ===== MODULAR JAVASCRIPT ===== -->
<!-- Utilities -->
<script src="js/utils.js"></script>
<!-- Calculation Engine -->
<script src="js/engine/dataTransform.js"></script>
<script src="js/engine/calculations.js"></script>
<script src="js/engine/model.js"></script>
<script src="js/engine/scoringEngine.js"></script>
<!-- Static Questionnaire (replaces GAS fetchQuestions) -->
<script src="js/questions.js"></script>
<!-- UI Components -->
<script src="js/ui/loadingModal.js"></script>
<script src="js/ui/formHandler.js"></script>
<!-- Portal Orchestrator -->
<script src="script.js"></script>
<!-- DEV TOOLS — remove before production if needed -->
<script src="js/devtools.js"></script>
</body>
</html>
